<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Master Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Day.js for date calculations -->
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/locale/th.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/plugin/customParseFormat.js"></script>
    <!-- Google Fonts: Kanit -->
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .vertical-top { vertical-align: top; }
        .progress-bar-container { height: 8px; background-color: #e2e8f0; border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; transition: width 0.5s ease-out; }
    </style>
</head>
<body class="text-slate-900">

    <div id="app">
        <!-- Navigation -->
        <nav class="bg-white border-b border-slate-200 sticky top-0 z-20 shadow-sm">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div class="flex items-center gap-3">
                    <div class="bg-slate-900 text-white p-2 rounded-xl shadow-lg shadow-slate-200">
                        <i data-lucide="layout-dashboard" class="w-6 h-6"></i>
                    </div>
                    <div>
                        <h1 class="text-xl font-extrabold text-slate-900 leading-tight">Project Master Dashboard</h1>
                        <p class="text-[10px] uppercase tracking-widest font-bold text-slate-400">Timeline & Progress Tracking</p>
                    </div>
                </div>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i data-lucide="search" class="h-4 w-4 text-slate-400"></i>
                    </div>
                    <input type="text" id="searchInput" placeholder="ค้นหาชื่องาน หรือ BU..." class="block w-full md:w-80 pl-10 pr-4 py-2.5 border border-slate-200 rounded-xl text-sm bg-slate-50 focus:bg-white focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all">
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-8">
            <!-- Stats Grid -->
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-6 mb-8">
                <div class="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm hover:shadow-md transition-shadow">
                    <div class="flex items-center justify-between text-indigo-600">
                        <div>
                            <p class="text-xs font-black uppercase text-slate-400 mb-1">งานทั้งหมด</p>
                            <p id="totalTasks" class="text-3xl font-black">0</p>
                        </div>
                        <div class="p-3 bg-indigo-50 rounded-xl"><i data-lucide="briefcase" class="w-6 h-6"></i></div>
                    </div>
                </div>
                <div class="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm hover:shadow-md transition-shadow">
                    <div class="flex items-center justify-between text-amber-600">
                        <div>
                            <p class="text-xs font-black uppercase text-slate-400 mb-1">กำลังดำเนินการ</p>
                            <p id="pendingTasks" class="text-3xl font-black">0</p>
                        </div>
                        <div class="p-3 bg-amber-50 rounded-xl"><i data-lucide="clock" class="w-6 h-6"></i></div>
                    </div>
                </div>
                <div class="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm hover:shadow-md transition-shadow">
                    <div class="flex items-center justify-between text-emerald-600">
                        <div>
                            <p class="text-xs font-black uppercase text-slate-400 mb-1">เสร็จสิ้น</p>
                            <p id="doneTasks" class="text-3xl font-black">0</p>
                        </div>
                        <div class="p-3 bg-emerald-50 rounded-xl"><i data-lucide="check-circle-2" class="w-6 h-6"></i></div>
                    </div>
                </div>
            </div>

            <!-- Tabs Navigation -->
            <div id="tabsContainer" class="flex items-center gap-2 mb-8 overflow-x-auto pb-2 hide-scrollbar"></div>

            <!-- Table Card -->
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden mb-12">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-50/50 border-b border-slate-100">
                                <th class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">Project / BU</th>
                                <th class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">Task & Timeline</th>
                                <th class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest text-center">Status</th>
                                <th class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">Next Step / Note</th>
                            </tr>
                        </thead>
                        <tbody id="taskTableBody" class="divide-y divide-slate-50 text-sm"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        dayjs.extend(window.dayjs_plugin_customParseFormat);
        dayjs.locale('th');

        // ข้อมูลอัปเดตจากไฟล์ล่าสุด (CSV 3)
        const rawData = [
            { id: 1, parentProject: "1. LOTTERY PLUS", bu: "Community (MKT)", task: "แนวทางการ BUILD COMMUNITY Online/Offline", detail: "การทำให้ COMMUNITY FIRST", statusIcon: "🟡", statusText: "กำลังดำเนินการ", nextStep: "รอ Team Event และ CMO อัพเดทแผน Build Community", receiveDate: "27 ก.พ. 69", deadline: "รอ CMO พี่อิทนัด MEETING" },
            { id: 2, parentProject: "1. LOTTERY PLUS", bu: "Brand Book", task: "จัดทำ Brand Book", detail: "รอทีม We Compound Brand ปรับปรุงจาก Comment", statusIcon: "🟡", statusText: "กำลังดำเนินการ", nextStep: "รอทางทีม We Compound Book คิว", receiveDate: "6 ก.พ. 69", deadline: "-" },
            { id: 3, parentProject: "1. LOTTERY PLUS", bu: "MKT Structure", task: "อนุมัติแผนโครงสร้างทีมใหม่", detail: "ประสาน HR ทำ JD และสรรหาคนเพิ่ม", statusIcon: "🟡", statusText: "กำลังดำเนินการ", nextStep: "Creator in resident CMO จะเสนอเงื่อนไขภายหลัง", receiveDate: "5 มี.ค. 69", deadline: "CMO Update Done" },
            { id: 4, parentProject: "1. LOTTERY PLUS", bu: "Event: Happy bus", task: "กิจกรรมรถบัสความสุข", detail: "สื่อสารถึงลูกค้าและรวมยอด", statusIcon: "🟡", statusText: "กำลังดำเนินการ", nextStep: "ตอนนี้ได้ 400/500 ขยายเวลาลงทะเบียนแล้ว", receiveDate: "ก.พ. 69", deadline: "11 เม.ย. 69" },
            { id: 5, parentProject: "1. LOTTERY PLUS", bu: "Event: Songkran", task: "แผนจัดงานสงกรานต์", detail: "สรุปงบและรายละเอียดกิจกรรม", statusIcon: "🟡", statusText: "กำลังดำเนินการ", nextStep: "MONO จะปรับ Road map และ สรุป Reqirement", receiveDate: "5 มี.ค. 69", deadline: "นัดคุย MONO 5 มี.ค. 14:00" },
            { id: 7, parentProject: "1. LOTTERY PLUS", bu: "NOKPLUSCLUB", task: "ทบทวนชื่อและ Feature", detail: "MVP 1 & 2 Timeline มาแล้ว", statusIcon: "🟡", statusText: "กำลังดำเนินการ", nextStep: "รวม MVP 1 & 2 ปล่อยไม่เกิน ต.ค.", receiveDate: "1 ก.พ. 69", deadline: "31 ต.ค. 69" },
            { id: 8, parentProject: "1. LOTTERY PLUS", bu: "Production", task: "นำเสนอ 3 รายการ Youtube", detail: "ขึ้น DEMO ทุกรายการ", statusIcon: "🟡", statusText: "กำลังดำเนินการ", nextStep: "Post ลง Social Media เรียบร้อยแล้ว", receiveDate: "1 ก.พ. 69", deadline: "รอ Comment จาก DEMO" },
            { id: 9, parentProject: "1. LOTTERY PLUS", bu: "The Next Gen", task: "โปรแกรมพัฒนาบุคลากร", detail: "Camp: 24-26 ก.พ. 69", statusIcon: "🟢", statusText: "DONE", nextStep: "DONE (รอ BrandBook)", receiveDate: "1 ม.ค. 69", deadline: "26 ก.พ. 69" },
            { id: 10, parentProject: "1. LOTTERY PLUS", bu: "HR Team", task: "สรุปแผนโครงสร้างทีม", detail: "รอนัดครั้งถัดไป", statusIcon: "🟡", statusText: "กำลังดำเนินการ", nextStep: "ต้องการการ Training พนักงานใหม่และเก่า", receiveDate: "9 มี.ค. 69", deadline: "รอคุณ รถตู้ นัด MEETING" },
            { id: 11, parentProject: "2. MU TODAY", bu: "MU TODAY Community", task: "หาหมอดู Partner ระยะยาว", detail: "พัฒนา Feature ร่วมกับหมอดู", statusIcon: "🟡", statusText: "กำลังดำเนินการ", nextStep: "นัดคุย Partnership Model", receiveDate: "6 มี.ค. 69", deadline: "-" },
            { id: 13, parentProject: "2. MU TODAY", bu: "ทำนายฝัน", task: "อัปเดตฐานข้อมูล AI", detail: "พัฒนา AI และ Content Social", statusIcon: "🟡", statusText: "กำลังดำเนินการ", nextStep: "หา Creative และ Tiktok", receiveDate: "11 ก.พ. 69", deadline: "-" },
            { id: 14, parentProject: "3. CHECKIN PLUS", bu: "CIP Update", task: "Sale Support & ระบบจ่ายเงิน", detail: "Sale Support 4 ตำแหน่ง", statusIcon: "🟡", statusText: "กำลังดำเนินการ", nextStep: "Checkin Book (BETA) ขึ้น Beta Web ปลาย มี.ค.", receiveDate: "6 ก.พ. 69", deadline: "31 มี.ค. 69" },
            { id: 15, parentProject: "4. THAIMART", bu: "Business Model", task: "Concept 'THAIMART = TRUST'", detail: "สรุปโมเดลธุรกิจ", statusIcon: "🟡", statusText: "กำลังดำเนินการ", nextStep: "BRAND BOOK THAIMART - รอดูมู้ดแอนด์โทน", receiveDate: "1 มี.ค. 69", deadline: "สิ้น พ.ย. 69" }
        ];

        let activeTab = "All Projects";
        let searchQuery = "";
        const projectsList = ["All Projects", "1. LOTTERY PLUS", "2. MU TODAY", "3. CHECKIN PLUS", "4. THAIMART"];

        // ฟังก์ชันแปลงวันที่ไทยเป็นสากลเพื่อการคำนวณ
        function parseThaiDate(dateStr) {
            if (!dateStr || dateStr === '-' || dateStr.includes('รอ') || dateStr.includes('นัด')) return null;
            
            // กรณีเป็น ก.พ. 69 (ไม่มีวันที่)
            const months = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];
            
            let clean = dateStr.replace(/\./g, '').trim();
            let parts = clean.split(' ');
            
            let day = 1;
            let monthLabel = "";
            let year = 69;

            if (parts.length === 2) { // เช่น "ก.พ. 69"
                monthLabel = parts[0];
                year = parseInt(parts[1]) || 69;
            } else if (parts.length >= 3) { // เช่น "27 ก.พ. 69"
                day = parseInt(parts[0]) || 1;
                monthLabel = parts[1];
                year = parseInt(parts[2]) || 69;
            } else {
                return null;
            }
            
            let monthIndex = months.findIndex(m => monthLabel.includes(m.replace('.',''))) ;
            if (monthIndex === -1) monthIndex = 0;

            const fullYear = year > 2500 ? year - 543 : (year < 100 ? year + 2000 - 43 + 2000 : year); 
            // ปรับปีให้เป็น ค.ศ. (ปี 69 ไทย = 2026)
            const calcYear = 2026; 
            
            return dayjs(`${calcYear}-${monthIndex + 1}-${day}`);
        }

        function calculateProgress(receive, deadline, status) {
            if (status === "🟢") return { percent: 100, color: 'bg-emerald-500', text: '100% DONE' };
            
            const start = parseThaiDate(receive);
            const end = parseThaiDate(deadline);
            const today = dayjs();

            if (!start || !end) return { percent: 0, color: 'bg-slate-200', text: 'รอระบุวันที่ชัดเจน' };

            const totalDays = end.diff(start, 'day');
            const elapsedDays = today.diff(start, 'day');
            
            if (totalDays <= 0) return { percent: 100, color: 'bg-emerald-500', text: '100%' };
            
            let percent = Math.round((elapsedDays / totalDays) * 100);
            percent = Math.max(0, Math.min(100, percent));

            let color = 'bg-indigo-500';
            if (percent > 85) color = 'bg-rose-500';
            else if (percent > 60) color = 'bg-amber-500';
            
            if (today.isAfter(end) && status !== "🟢") {
                return { percent: 100, color: 'bg-rose-600', text: 'เกินกำหนด!' };
            }

            return { percent, color, text: percent + '%' };
        }

        function getProjectColor(name) {
            if (name.includes("1")) return "bg-red-500";
            if (name.includes("2")) return "bg-purple-500";
            if (name.includes("3")) return "bg-amber-400"; // เหลือง
            if (name.includes("4")) return "bg-sky-400";   // ฟ้า
            return "bg-slate-500";
        }

        function render() {
            const filtered = rawData.filter(item => {
                const matchTab = activeTab === "All Projects" || item.parentProject === activeTab;
                const s = searchQuery.toLowerCase();
                const matchSearch = item.bu.toLowerCase().includes(s) || item.task.toLowerCase().includes(s) || item.nextStep.toLowerCase().includes(s);
                return matchTab && matchSearch;
            });

            document.getElementById('totalTasks').innerText = filtered.length;
            document.getElementById('pendingTasks').innerText = filtered.filter(d => d.statusIcon === "🟡").length;
            document.getElementById('doneTasks').innerText = filtered.filter(d => d.statusIcon === "🟢").length;

            const tabsContainer = document.getElementById('tabsContainer');
            tabsContainer.innerHTML = projectsList.map(p => `
                <button onclick="setActiveTab('${p}')" class="px-5 py-2.5 rounded-xl text-sm font-bold transition-all whitespace-nowrap ${activeTab === p ? 'bg-slate-900 text-white shadow-lg scale-105' : 'bg-white text-slate-500 border border-slate-200 hover:border-slate-400 shadow-sm'}">
                    ${p === 'All Projects' ? 'ภาพรวมทั้งหมด' : p}
                </button>
            `).join('');

            const tbody = document.getElementById('taskTableBody');
            tbody.innerHTML = filtered.map(row => {
                const prog = calculateProgress(row.receiveDate, row.deadline, row.statusIcon);
                
                return `
                    <tr class="group hover:bg-slate-50/80 transition-colors">
                        <td class="px-6 py-6 vertical-top min-w-[180px]">
                            <span class="inline-block px-2 py-0.5 rounded text-[9px] font-black text-white ${getProjectColor(row.parentProject)} mb-2 tracking-tighter uppercase">${row.parentProject}</span>
                            <div class="font-bold text-slate-900 leading-tight text-sm">${row.bu}</div>
                        </td>
                        <td class="px-6 py-6 vertical-top">
                            <div class="font-bold text-slate-800 mb-1 text-sm">${row.task}</div>
                            <div class="flex items-center gap-3 text-[10px] text-slate-400 mb-4">
                                <span class="flex items-center gap-1"><i data-lucide="calendar" class="w-3 h-3"></i> ${row.receiveDate || '-'}</span>
                                <i data-lucide="arrow-right" class="w-3 h-3"></i>
                                <span class="font-bold text-slate-600">${row.deadline || 'ยังไม่ระบุ'}</span>
                            </div>
                            
                            <!-- Progress Bar Area -->
                            <div class="w-full max-w-[260px]">
                                <div class="flex justify-between items-center mb-1.5 text-[10px] font-black uppercase tracking-wider">
                                    <span class="text-slate-400">Project Timeline</span>
                                    <span class="${prog.color.replace('bg-', 'text-')}">${prog.text}</span>
                                </div>
                                <div class="progress-bar-container bg-slate-100">
                                    <div class="progress-fill ${prog.color} shadow-sm" style="width: ${prog.percent}%"></div>
                                </div>
                            </div>
                        </td>
                        <td class="px-6 py-6 vertical-top text-center">
                            <span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-[11px] font-black ${row.statusIcon === '🟢' ? 'bg-emerald-50 text-emerald-600 border-emerald-100' : 'bg-amber-50 text-amber-600 border-amber-100'} border">
                                <span class="w-1.5 h-1.5 rounded-full ${row.statusIcon === '🟢' ? 'bg-emerald-500' : 'bg-amber-500'} animate-pulse"></span>
                                ${row.statusText}
                            </span>
                        </td>
                        <td class="px-6 py-6 vertical-top">
                            <div class="bg-slate-50/50 group-hover:bg-white p-3 rounded-xl border border-slate-100 flex gap-2 transition-colors">
                                <i data-lucide="info" class="w-3.5 h-3.5 text-indigo-400 mt-0.5 flex-shrink-0"></i>
                                <div class="flex flex-col gap-1">
                                    <span class="text-[11px] font-bold text-slate-700 leading-snug">${row.nextStep || row.detail}</span>
                                    ${row.deadline && row.deadline.includes('นัด') ? `<span class="text-[9px] text-rose-500 font-bold uppercase tracking-tighter">* ${row.deadline}</span>` : ''}
                                </div>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
            
            lucide.createIcons();
        }

        function setActiveTab(tab) { activeTab = tab; render(); }
        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchQuery = e.target.value;
            render();
        });

        window.onload = render;
    </script>
</body>
</html>
