<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Master Dashboard - TV Mode</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Day.js for date calculations -->
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/locale/th.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/plugin/customParseFormat.js"></script>
    <!-- Google Fonts: Kanit -->
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Kanit', sans-serif; 
            background-color: #f1f5f9; 
            overflow: hidden; /* ป้องกันการ Scroll สำหรับจอ TV */
            height: 100vh;
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* ปรับระดับความสูงของ Table ให้พอดีจอ */
        .dashboard-container {
            height: calc(100vh - 140px);
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* แบ่ง 2 คอลัมน์เพื่อให้เห็นงานเยอะขึ้นในหน้าเดียว */
            gap: 12px;
            overflow-y: auto;
            padding-bottom: 20px;
        }
        
        .project-card {
            background: white;
            border-radius: 12px;
            padding: 12px;
            border: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: all 0.2s;
        }

        .progress-bar-container { height: 6px; background-color: #e2e8f0; border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; transition: width 0.5s ease-out; }
    </style>
</head>
<body class="text-slate-900 p-4">

    <div id="app" class="h-full flex flex-col">
        <!-- Header -->
        <header class="flex items-center justify-between mb-4 bg-white p-3 rounded-2xl border border-slate-200 shadow-sm">
            <div class="flex items-center gap-3">
                <div class="bg-slate-900 text-white p-2 rounded-lg">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                </div>
                <div>
                    <h1 class="text-lg font-extrabold text-slate-900 leading-none">Project Master Dashboard</h1>
                    <p class="text-[9px] uppercase tracking-widest font-bold text-slate-400">TV Monitoring Mode (65")</p>
                </div>
            </div>

            <!-- Stats Bar -->
            <div class="flex gap-6">
                <div class="flex items-center gap-2">
                    <span class="text-[10px] font-bold text-slate-400 uppercase">Total:</span>
                    <span id="totalTasks" class="text-lg font-black text-indigo-600">0</span>
                </div>
                <div class="flex items-center gap-2">
                    <span class="text-[10px] font-bold text-slate-400 uppercase">Pending:</span>
                    <span id="pendingTasks" class="text-lg font-black text-amber-500">0</span>
                </div>
                <div class="flex items-center gap-2">
                    <span class="text-[10px] font-bold text-slate-400 uppercase">Done:</span>
                    <span id="doneTasks" class="text-lg font-black text-emerald-500">0</span>
                </div>
            </div>

            <div id="tabsContainer" class="flex items-center gap-1 overflow-x-auto hide-scrollbar"></div>
        </header>

        <!-- Main Grid Layout -->
        <div id="projectGrid" class="dashboard-container hide-scrollbar">
            <!-- Cards will be injected here -->
        </div>
    </div>

    <script>
        dayjs.extend(window.dayjs_plugin_customParseFormat);
        dayjs.locale('th');

        const rawData = [
            { id: 1, parentProject: "1. LOTTERY PLUS", bu: "Community (MKT)", task: "แนวทางการ BUILD COMMUNITY", detail: "การทำให้ COMMUNITY FIRST", statusIcon: "🟡", statusText: "กำลังดำเนินการ", nextStep: "รอ Team Event และ CMO อัพเดทแผน Build Community", receiveDate: "27 ก.พ. 69", deadline: "รอ CMO พี่อิทนัด MEETING" },
            { id: 2, parentProject: "1. LOTTERY PLUS", bu: "Brand Book", task: "จัดทำ Brand Book", detail: "รอทีม We Compound Brand ปรับปรุงจาก Comment", statusIcon: "🟡", statusText: "กำลังดำเนินการ", nextStep: "รอทางทีม We Compound Book คิว", receiveDate: "6 ก.พ. 69", deadline: "-" },
            { id: 3, parentProject: "1. LOTTERY PLUS", bu: "MKT Structure", task: "อนุมัติแผนโครงสร้างทีมใหม่", detail: "ประสาน HR ทำ JD และสรรหาคนเพิ่ม", statusIcon: "🟡", statusText: "กำลังดำเนินการ", nextStep: "Creator in resident CMO จะเสนอเงื่อนไขภายหลัง", receiveDate: "5 มี.ค. 69", deadline: "CMO Update Done" },
            { id: 4, parentProject: "1. LOTTERY PLUS", bu: "Event: Happy bus", task: "กิจกรรมรถบัสความสุข", detail: "สื่อสารถึงลูกค้าและรวมยอด", statusIcon: "🟡", statusText: "กำลังดำเนินการ", nextStep: "ตอนนี้ได้ 400/500 ขยายเวลาลงทะเบียนแล้ว", receiveDate: "ก.พ. 69", deadline: "11 เม.ย. 69" },
            { id: 5, parentProject: "1. LOTTERY PLUS", bu: "Event: Songkran", task: "แผนจัดงานสงกรานต์", detail: "สรุปงบและรายละเอียดกิจกรรม", statusIcon: "🟡", statusText: "กำลังดำเนินการ", nextStep: "MONO จะปรับ Road map และ สรุป Reqirement", receiveDate: "5 มี.ค. 69", deadline: "นัดคุย MONO 5 มี.ค. 14:00" },
            { id: 7, parentProject: "1. LOTTERY PLUS", bu: "NOKPLUSCLUB", task: "ทบทวนชื่อและ Feature", detail: "MVP 1 & 2 Timeline มาแล้ว", statusIcon: "🟡", statusText: "กำลังดำเนินการ", nextStep: "รวม MVP 1 & 2 ปล่อยไม่เกิน ต.ค.", receiveDate: "1 ก.พ. 69", deadline: "31 ต.ค. 69" },
            { id: 8, parentProject: "1. LOTTERY PLUS", bu: "Production", task: "นำเสนอ 3 รายการ Youtube", detail: "ขึ้น DEMO ทุกรายการ", statusIcon: "🟡", statusText: "กำลังดำเนินการ", nextStep: "Post ลง Social Media เรียบร้อยแล้ว", receiveDate: "1 ก.พ. 69", deadline: "รอ Comment จาก DEMO" },
            { id: 9, parentProject: "1. LOTTERY PLUS", bu: "The Next Gen", task: "โปรแกรมพัฒนาบุคลากร", detail: "Camp: 24-26 ก.พ. 69", statusIcon: "🟢", statusText: "DONE", nextStep: "DONE (รอ BrandBook)", receiveDate: "1 ม.ค. 69", deadline: "26 ก.พ. 69" },
            { id: 10, parentProject: "1. LOTTERY PLUS", bu: "HR Team", task: "สรุปแผนโครงสร้างทีม", detail: "รอนัดครั้งถัดไป", statusIcon: "🟡", statusText: "กำลังดำเนินการ", nextStep: "ต้องการการ Training พนักงานใหม่และเก่า", receiveDate: "9 มี.ค. 69", deadline: "รอคุณ รถตู้ นัด MEETING" },
            { id: 11, parentProject: "2. MU TODAY", bu: "MU TODAY Community", task: "หาหมอดู Partner ระยะยาว", detail: "พัฒนา Feature ร่วมกับหมอดู", statusIcon: "🟡", statusText: "กำลังดำเนินการ", nextStep: "นัดคุย Partnership Model", receiveDate: "6 มี.ค. 69", deadline: "-" },
            { id: 13, parentProject: "2. MU TODAY", bu: "ทำนายฝัน", task: "อัปเดตฐานข้อมูล AI", detail: "พัฒนา AI และ Content Social", statusIcon: "🟡", statusText: "กำลังดำเนินการ", nextStep: "หา Creative และ Tiktok", receiveDate: "11 ก.พ. 69", deadline: "-" },
            { id: 14, parentProject: "3. CHECKIN PLUS", bu: "CIP Update", task: "Sale Support & ระบบจ่ายเงิน", detail: "Sale Support 4 ตำแหน่ง", statusIcon: "🟡", statusText: "กำลังดำเนินการ", nextStep: "Checkin Book (BETA) ขึ้น Beta Web ปลาย มี.ค.", receiveDate: "6 ก.พ. 69", deadline: "31 มี.ค. 69" },
            { id: 15, parentProject: "4. THAIMART", bu: "Business Model", task: "Concept 'THAIMART = TRUST'", detail: "สรุปโมเดลธุรกิจ", statusIcon: "🟡", statusText: "กำลังดำเนินการ", nextStep: "BRAND BOOK THAIMART - รอดูมู้ดแอนด์โทน", receiveDate: "1 มี.ค. 69", deadline: "สิ้น พ.ย. 69" }
        ];

        let activeTab = "All Projects";
        const projectsList = ["All Projects", "1. LOTTERY PLUS", "2. MU TODAY", "3. CHECKIN PLUS", "4. THAIMART"];

        function parseThaiDate(dateStr) {
            if (!dateStr || dateStr === '-' || dateStr.includes('รอ') || dateStr.includes('นัด')) return null;
            const months = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];
            let clean = dateStr.replace(/\./g, '').trim();
            let parts = clean.split(' ');
            let day = 1, monthLabel = "", year = 69;
            if (parts.length === 2) { monthLabel = parts[0]; year = parseInt(parts[1]) || 69; }
            else if (parts.length >= 3) { day = parseInt(parts[0]) || 1; monthLabel = parts[1]; year = parseInt(parts[2]) || 69; }
            else return null;
            let monthIndex = months.findIndex(m => monthLabel.includes(m.replace('.',''))) ;
            if (monthIndex === -1) monthIndex = 0;
            return dayjs(`2026-${monthIndex + 1}-${day}`);
        }

        function calculateProgress(receive, deadline, status) {
            if (status === "🟢") return { percent: 100, color: 'bg-emerald-500', text: '100% DONE', textColor: 'text-emerald-600' };
            const start = parseThaiDate(receive);
            const end = parseThaiDate(deadline);
            const today = dayjs();
            if (!start || !end) return { percent: 0, color: 'bg-slate-200', text: 'รอระบุวันที่ชัดเจน', textColor: 'text-slate-600' }; // ปรับสี Text ให้เข้มขึ้น
            const totalDays = end.diff(start, 'day');
            const elapsedDays = today.diff(start, 'day');
            if (totalDays <= 0) return { percent: 100, color: 'bg-emerald-500', text: '100%', textColor: 'text-emerald-600' };
            let percent = Math.max(0, Math.min(100, Math.round((elapsedDays / totalDays) * 100)));
            let color = 'bg-indigo-500';
            let textColor = 'text-indigo-600';
            if (percent > 85) { color = 'bg-rose-500'; textColor = 'text-rose-600'; }
            else if (percent > 60) { color = 'bg-amber-500'; textColor = 'text-amber-600'; }
            return { percent, color, text: percent + '%', textColor };
        }

        function getProjectColor(name) {
            if (name.includes("1")) return "bg-red-500";
            if (name.includes("2")) return "bg-purple-500";
            if (name.includes("3")) return "bg-amber-400";
            if (name.includes("4")) return "bg-sky-400";
            return "bg-slate-500";
        }

        function render() {
            const filtered = rawData.filter(item => activeTab === "All Projects" || item.parentProject === activeTab);

            document.getElementById('totalTasks').innerText = filtered.length;
            document.getElementById('pendingTasks').innerText = filtered.filter(d => d.statusIcon === "🟡").length;
            document.getElementById('doneTasks').innerText = filtered.filter(d => d.statusIcon === "🟢").length;

            const tabsContainer = document.getElementById('tabsContainer');
            tabsContainer.innerHTML = projectsList.map(p => `
                <button onclick="setActiveTab('${p}')" class="px-3 py-1.5 rounded-lg text-[10px] font-black transition-all whitespace-nowrap ${activeTab === p ? 'bg-slate-900 text-white' : 'bg-slate-100 text-slate-500 border border-slate-200'}">
                    ${p === 'All Projects' ? 'ALL' : p.split('. ')[1]}
                </button>
            `).join('');

            const grid = document.getElementById('projectGrid');
            grid.innerHTML = filtered.map(row => {
                const prog = calculateProgress(row.receiveDate, row.deadline, row.statusIcon);
                return `
                    <div class="project-card shadow-sm hover:border-slate-300">
                        <div class="flex justify-between items-start mb-2">
                            <div class="flex flex-col">
                                <span class="inline-block w-fit px-1.5 py-0.5 rounded text-[8px] font-black text-white ${getProjectColor(row.parentProject)} mb-1 uppercase tracking-tighter">
                                    ${row.parentProject}
                                </span>
                                <h3 class="font-bold text-slate-900 text-xs leading-tight">${row.bu}</h3>
                                <p class="text-[10px] text-slate-500 font-medium">${row.task}</p>
                            </div>
                            <span class="inline-flex items-center gap-1 px-1.5 py-0.5 rounded-full text-[9px] font-black ${row.statusIcon === '🟢' ? 'bg-emerald-50 text-emerald-600' : 'bg-amber-50 text-amber-600'} border border-current">
                                <span class="w-1 h-1 rounded-full ${row.statusIcon === '🟢' ? 'bg-emerald-500' : 'bg-amber-500'}"></span>
                                ${row.statusText}
                            </span>
                        </div>

                        <div class="bg-slate-50 p-2 rounded-lg mb-2 flex flex-col gap-1">
                            <div class="flex items-center gap-2 text-[9px]">
                                <i data-lucide="info" class="w-3 h-3 text-slate-400"></i>
                                <span class="text-slate-700 font-medium line-clamp-1">${row.nextStep}</span>
                            </div>
                        </div>

                        <div>
                            <div class="flex justify-between items-center mb-1 text-[9px] font-bold">
                                <span class="text-slate-700 uppercase tracking-tight">Project Timeline</span>
                                <span class="${prog.textColor}">${prog.text}</span>
                            </div>
                            <div class="progress-bar-container bg-slate-200">
                                <div class="progress-fill ${prog.color}" style="width: ${prog.percent}%"></div>
                            </div>
                            <div class="flex justify-between mt-1 text-[8px] font-bold text-slate-400">
                                <span>Start: ${row.receiveDate || '-'}</span>
                                <span class="text-slate-600">DL: ${row.deadline || 'N/A'}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            
            lucide.createIcons();
        }

        function setActiveTab(tab) { activeTab = tab; render(); }
        window.onload = render;
    </script>
</body>
</html>
