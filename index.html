<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Dashboard - Auto Sorting by Progress</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/locale/th.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/plugin/customParseFormat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; overflow: hidden; height: 100vh; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .main-dashboard-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; height: calc(100vh - 110px); padding-bottom: 20px; }
        .project-column { display: flex; flex-direction: column; gap: 12px; overflow-y: auto; padding-right: 4px; }
        .project-card { border-radius: 12px; padding: 14px; border-left: 8px solid; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); background-color: white; border-right: 1px solid #f1f5f9; border-top: 1px solid #f1f5f9; border-bottom: 1px solid #f1f5f9; transition: all 0.3s ease; }
        .project-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .progress-bar-container { height: 10px; background-color: #f1f5f9; border-radius: 6px; overflow: hidden; margin-top: 6px; width: 100%; position: relative; }
        .progress-fill { height: 100%; transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 6px; }
        .filter-chip { cursor: pointer; transition: all 0.2s; }
        .filter-chip.active { background-color: #1e293b; color: white; }
    </style>
</head>
<body class="text-slate-900 p-4">

    <div id="app" class="h-full flex flex-col">
        <!-- Header -->
        <header class="flex items-center justify-between mb-4 bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 text-white p-2.5 rounded-xl">
                    <i data-lucide="layout-grid" class="w-6 h-6"></i>
                </div>
                <div>
                    <h1 class="text-lg font-bold text-slate-900 leading-none">Project Roadmap & Monitoring</h1>
                    <p id="current-date-display" class="text-[10px] font-bold text-slate-400 mt-1 uppercase tracking-widest"></p>
                </div>
            </div>

            <div class="flex items-center gap-10">
                <div class="text-right">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Active Tasks</p>
                    <p id="pendingTasks" class="text-xl font-black text-indigo-600 leading-none mt-1">0</p>
                </div>
                <div class="h-10 w-[1px] bg-slate-100"></div>
                <div class="flex flex-col items-end">
                    <span class="text-[10px] font-black text-emerald-600 bg-emerald-50 px-2 py-1 rounded tracking-tighter">วันที่จำลอง (Simulated)</span>
                    <span class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">19 มี.ค. 2569</span>
                </div>
            </div>
        </header>

        <div class="main-dashboard-grid">
            <!-- 1. LOTTERY PLUS -->
            <div class="project-column hide-scrollbar">
                <div class="sticky top-0 bg-white/90 backdrop-blur px-3 py-2 rounded-xl mb-2 z-10 border border-slate-100 shadow-sm">
                    <div class="flex items-center justify-between mb-2">
                        <span class="text-[11px] font-black text-red-600 tracking-widest uppercase">1. LOTTERY PLUS</span>
                        <div class="flex gap-1" id="filter-1">
                            <span onclick="setFilter('1', 'all')" class="filter-chip active text-[8px] px-2 py-0.5 rounded-full border border-slate-200 font-bold uppercase">All</span>
                            <span onclick="setFilter('1', 'pending')" class="filter-chip text-[8px] px-2 py-0.5 rounded-full border border-slate-200 font-bold uppercase">🟡</span>
                            <span onclick="setFilter('1', 'done')" class="filter-chip text-[8px] px-2 py-0.5 rounded-full border border-slate-200 font-bold uppercase">🟢</span>
                        </div>
                    </div>
                    <div class="text-[9px] text-slate-400 font-medium">เรียงตาม: ความคืบหน้า (มาก → น้อย)</div>
                </div>
                <div id="lotteryGrid" class="flex flex-col gap-3"></div>
            </div>

            <!-- 2. MU TODAY -->
            <div class="project-column hide-scrollbar">
                <div class="sticky top-0 bg-white/90 backdrop-blur px-3 py-2 rounded-xl mb-2 z-10 border border-slate-100 shadow-sm">
                    <div class="flex items-center justify-between mb-2">
                        <span class="text-[11px] font-black text-purple-600 tracking-widest uppercase">2. MU TODAY</span>
                        <div class="flex gap-1" id="filter-2">
                            <span onclick="setFilter('2', 'all')" class="filter-chip active text-[8px] px-2 py-0.5 rounded-full border border-slate-200 font-bold uppercase">All</span>
                            <span onclick="setFilter('2', 'pending')" class="filter-chip text-[8px] px-2 py-0.5 rounded-full border border-slate-200 font-bold uppercase">🟡</span>
                        </div>
                    </div>
                    <div class="text-[9px] text-slate-400 font-medium">เรียงตาม: ความคืบหน้า (มาก → น้อย)</div>
                </div>
                <div id="muGrid" class="flex flex-col gap-3"></div>
            </div>

            <!-- 3. MIXED & OTHERS -->
            <div class="project-column hide-scrollbar">
                <div class="sticky top-0 bg-white/90 backdrop-blur px-3 py-2 rounded-xl mb-2 z-10 border border-slate-100 shadow-sm">
                    <div class="flex items-center justify-between mb-2">
                        <span class="text-[11px] font-black text-amber-600 tracking-widest uppercase">3. MIXED PROJECTS</span>
                        <div class="flex gap-1" id="filter-3">
                            <span onclick="setFilter('3', 'all')" class="filter-chip active text-[8px] px-2 py-0.5 rounded-full border border-slate-200 font-bold uppercase">All</span>
                            <span onclick="setFilter('3', 'pending')" class="filter-chip text-[8px] px-2 py-0.5 rounded-full border border-slate-200 font-bold uppercase">🟡</span>
                        </div>
                    </div>
                    <div class="text-[9px] text-slate-400 font-medium">เรียงตาม: ความคืบหน้า (มาก → น้อย)</div>
                </div>
                <div id="mixedGrid" class="flex flex-col gap-3"></div>
            </div>
        </div>
    </div>

    <script>
        dayjs.extend(window.dayjs_plugin_customParseFormat);
        dayjs.locale('th');

        const SIMULATED_NOW = dayjs('2026-03-19');
        let currentFilters = { '1': 'all', '2': 'all', '3': 'all' };

        const rawData = [
            { id: 1, parentProject: "1. LOTTERY PLUS", bu: "Community (MKT)", task: "แนวทางการ BUILD COMMUNITY", statusIcon: "🟡", statusText: "Pending", nextStep: "รอ Team Event และ CMO อัพเดทแผน Builld Community", receiveDate: "2/27", deadline: "-" },
            { id: 2, parentProject: "1. LOTTERY PLUS", bu: "Brand Book", task: "จัดทำ Brand Book", statusIcon: "🟡", statusText: "Pending", nextStep: "รอทางทีม We Compound Book คิว", receiveDate: "2/6", deadline: "-" },
            { id: 3, parentProject: "1. LOTTERY PLUS", bu: "MKT Structure", task: "อนุมัติแผนโครงสร้างทีมใหม่", statusIcon: "🟡", statusText: "Pending", nextStep: "CMO จะนำเสนอกรอบเวลาและแนวทางภายหลัง", receiveDate: "3/5", deadline: "-" },
            { id: 4, parentProject: "1. LOTTERY PLUS", bu: "Event: Happy bus", task: "กิจกรรมรถบัสความสุข", statusIcon: "🟡", statusText: "Pending", nextStep: "ได้ 400/500 ขยายเวลาลงทะเบียนแล้ว", receiveDate: "2/20", deadline: "4/10" },
            { id: 5, parentProject: "1. LOTTERY PLUS", bu: "Event: Songkran", task: "แผนจัดงานสงกรานต์", statusIcon: "🟡", statusText: "Pending", nextStep: "MONO ปรับ Road map และสรุป Req ภายใน 23 มี.ค.", receiveDate: "3/5", deadline: "3/23" },
            { id: 6, parentProject: "1. LOTTERY PLUS", bu: "Racing Project", task: "Agenda วันซ้อม/วันแข่ง", statusIcon: "🟡", statusText: "Pending", nextStep: "รอคุณ ต้น DEV นัด MEETING เพื่อคุย Feature", receiveDate: "3/6", deadline: "-" },
            { id: 7, parentProject: "1. LOTTERY PLUS", bu: "Production", task: "นำเสนอ 3 รายการ Youtube", statusIcon: "🟡", statusText: "Pending", nextStep: "Post ลง Social Media แล้ว (ขึ้น Demo ทุกรายการ)", receiveDate: "2/1", deadline: "-" },
            { id: 8, parentProject: "1. LOTTERY PLUS", bu: "The Next Gen (คุณ SOFT)", task: "โปรแกรมพัฒนาบุคลากร", statusIcon: "🟡", statusText: "Pending", nextStep: "รอประชุม Brand Book กับคุณซอฟ", receiveDate: "3/5", deadline: "3/25" },
            { id: 9, parentProject: "1. LOTTERY PLUS", bu: "HR Team", task: "สรุปแผนโครงสร้าง TEAM", statusIcon: "🟡", statusText: "Pending", nextStep: "รอคุณ รถตู้ นัด MEETING", receiveDate: "3/9", deadline: "-" },
            { id: 10, parentProject: "2. MU TODAY", bu: "MU Community", task: "หยุดโฟกัส Community ชั่วคราว", statusIcon: "🟡", statusText: "Pending", nextStep: "เน้น Partner First! Support Content", receiveDate: "3/6", deadline: "-" },
            { id: 11, parentProject: "2. MU TODAY", bu: "ทำนายฝัน", task: "อัปเดตฐานข้อมูลและการทำนาย", statusIcon: "🟡", statusText: "Pending", nextStep: "หา Creative และ TIktok / นัดคุย Model", receiveDate: "2/11", deadline: "-" },
            { id: 12, parentProject: "3. CHECKIN PLUS", bu: "CIP Update", task: "Sale Support & ระบบจ่ายเงิน", statusIcon: "🟡", statusText: "Pending", nextStep: "Checkin Book (BETA) ปลาย มี.ค.", receiveDate: "2/6", deadline: "-" },
            { id: 13, parentProject: "4. THAIMART", bu: "Business Model", task: "คอนเซปต์ 'THAIMART = TRUST'", statusIcon: "🟡", statusText: "Pending", nextStep: "รอดู Brandbook ของ LotteryPlus ก่อน", receiveDate: "3/1", deadline: "-" }
        ];

        function extractDate(dateString) {
            if (!dateString || dateString.trim() === '-' || dateString.trim() === '') return null;
            if (dateString.includes('/')) {
                const [m, d] = dateString.split('/').map(n => parseInt(n));
                if (!isNaN(m) && !isNaN(d)) return dayjs(`2026-${m}-${d}`);
            }
            return null;
        }

        function calculateProgressValue(item) {
            if (item.statusIcon === "🟢") return 100;
            const start = extractDate(item.receiveDate);
            const end = extractDate(item.deadline);
            if (!end) return 10; // Default for no deadline
            const baseStart = start || end.subtract(14, 'day');
            const totalDays = end.diff(baseStart, 'day');
            const passedDays = SIMULATED_NOW.diff(baseStart, 'day');
            if (totalDays <= 0) return SIMULATED_NOW.isAfter(end) ? 100 : 90;
            return Math.max(5, Math.min(99, Math.round((passedDays / totalDays) * 100)));
        }

        function setFilter(colId, filterType) {
            currentFilters[colId] = filterType;
            // Update UI chips
            const container = document.getElementById(`filter-${colId}`);
            container.querySelectorAll('.filter-chip').forEach(chip => {
                chip.classList.remove('active');
                if (chip.innerText.toLowerCase().includes(filterType) || (filterType === 'all' && chip.innerText === 'ALL')) {
                    chip.classList.add('active');
                }
            });
            render();
        }

        function createCard(item) {
            const colors = item.parentProject.includes("1") ? { border: "border-red-500", bar: "#ef4444", text: "text-red-600" } :
                           item.parentProject.includes("2") ? { border: "border-purple-600", bar: "#9333ea", text: "text-purple-600" } :
                           { border: "border-amber-500", bar: "#f59e0b", text: "text-amber-600" };
            
            const pVal = calculateProgressValue(item);
            const label = item.statusIcon === "🟢" ? "DONE" : (item.deadline === "-" ? item.nextStep : pVal + "%");

            return `
                <div class="project-card ${colors.border}">
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-[9px] font-black uppercase text-slate-400 tracking-wider">${item.bu}</span>
                        <div class="flex items-center gap-1 px-2 py-0.5 rounded-full bg-slate-50 border border-slate-100">
                            <span class="text-[10px]">${item.statusIcon}</span>
                            <span class="text-[9px] font-black text-slate-600 uppercase">${item.statusText}</span>
                        </div>
                    </div>
                    <h3 class="text-[12px] font-bold text-slate-800 leading-tight mb-2 line-clamp-1">${item.task}</h3>
                    <div class="bg-slate-50/80 p-2 rounded-lg border border-slate-100 mb-3">
                        <p class="text-[10px] font-medium text-slate-600 leading-relaxed line-clamp-2">
                            <span class="text-indigo-500 font-bold">Details:</span> ${item.nextStep}
                        </p>
                    </div>
                    <div class="space-y-1">
                        <div class="flex justify-between items-end">
                            <span class="text-[9px] font-bold text-slate-300 uppercase">Progress</span>
                            <span class="text-[10px] font-black ${colors.text}">${label}</span>
                        </div>
                        <div class="progress-bar-container">
                            <div class="progress-fill" style="width: ${pVal}%; background-color: ${colors.bar};"></div>
                        </div>
                        <div class="flex justify-between items-center text-[8px] font-bold text-slate-400 pt-1">
                            <span>เริ่ม: ${item.receiveDate}</span>
                            <span>จบ: ${item.deadline}</span>
                        </div>
                    </div>
                </div>
            `;
        }

        function render() {
            document.getElementById('current-date-display').innerText = SIMULATED_NOW.format('dddd, DD MMMM YYYY');
            
            // 1. Calculate & Sort Data
            const sortedData = rawData.map(item => ({
                ...item,
                _pVal: calculateProgressValue(item)
            })).sort((a, b) => b._pVal - a._pVal); // เรียงจากมากไปน้อย

            // 2. Filter Logic
            const filterByStatus = (list, colId) => {
                const type = currentFilters[colId];
                if (type === 'all') return list;
                if (type === 'pending') return list.filter(i => i.statusIcon === "🟡");
                if (type === 'done') return list.filter(i => i.statusIcon === "🟢");
                return list;
            };

            const lottery = filterByStatus(sortedData.filter(i => i.parentProject.includes("1")), '1');
            const mu = filterByStatus(sortedData.filter(i => i.parentProject.includes("2")), '2');
            const mixed = filterByStatus(sortedData.filter(i => i.parentProject.includes("3") || i.parentProject.includes("4")), '3');

            // 3. Render to DOM
            document.getElementById('pendingTasks').innerText = rawData.filter(i => i.statusIcon === "🟡").length;
            document.getElementById('lotteryGrid').innerHTML = lottery.map(createCard).join('');
            document.getElementById('muGrid').innerHTML = mu.map(createCard).join('');
            document.getElementById('mixedGrid').innerHTML = mixed.map(createCard).join('');

            lucide.createIcons();
        }

        window.onload = render;
    </script>
</body>
</html>
