<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Master Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts: Kanit -->
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .vertical-top { vertical-align: top; }
    </style>
</head>
<body class="text-slate-900">

    <div id="app">
        <!-- Navigation -->
        <nav class="bg-white border-b border-slate-200 sticky top-0 z-20 shadow-sm">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div class="flex items-center gap-3">
                    <div class="bg-slate-900 text-white p-2 rounded-xl">
                        <i data-lucide="layout-dashboard" class="w-6 h-6"></i>
                    </div>
                    <div>
                        <h1 class="text-xl font-extrabold text-slate-900 leading-tight">Project Master Dashboard</h1>
                        <p class="text-[10px] uppercase tracking-widest font-bold text-slate-400">Real-time Project Tracking</p>
                    </div>
                </div>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i data-lucide="search" class="h-4 w-4 text-slate-400"></i>
                    </div>
                    <input type="text" id="searchInput" placeholder="ค้นหาชื่องาน หรือ BU..." class="block w-full md:w-80 pl-10 pr-4 py-2.5 border border-slate-200 rounded-xl text-sm bg-slate-50 focus:bg-white focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all">
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-8">
            <!-- Stats Grid -->
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-6 mb-8">
                <div class="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-xs font-black uppercase text-slate-400 mb-1">งานทั้งหมด</p>
                            <p id="totalTasks" class="text-3xl font-black text-indigo-600">0</p>
                        </div>
                        <div class="p-3 bg-indigo-50 text-indigo-600 rounded-xl">
                            <i data-lucide="briefcase" class="w-6 h-6"></i>
                        </div>
                    </div>
                </div>
                <div class="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-xs font-black uppercase text-slate-400 mb-1">กำลังดำเนินการ</p>
                            <p id="pendingTasks" class="text-3xl font-black text-amber-600">0</p>
                        </div>
                        <div class="p-3 bg-amber-50 text-amber-600 rounded-xl">
                            <i data-lucide="clock" class="w-6 h-6"></i>
                        </div>
                    </div>
                </div>
                <div class="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-xs font-black uppercase text-slate-400 mb-1">เสร็จสิ้น</p>
                            <p id="doneTasks" class="text-3xl font-black text-emerald-600">0</p>
                        </div>
                        <div class="p-3 bg-emerald-50 text-emerald-600 rounded-xl">
                            <i data-lucide="check-circle-2" class="w-6 h-6"></i>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Tabs Navigation -->
            <div id="tabsContainer" class="flex items-center gap-2 mb-8 overflow-x-auto pb-2 hide-scrollbar">
                <!-- Tabs will be rendered by JS -->
            </div>

            <!-- Table Card -->
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden mb-12">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-50/50 border-b border-slate-100">
                                <th class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">Project / BU</th>
                                <th class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">Task Details</th>
                                <th class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">Status</th>
                                <th class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">Next Action</th>
                            </tr>
                        </thead>
                        <tbody id="taskTableBody" class="divide-y divide-slate-50">
                            <!-- Tasks will be rendered by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        // ข้อมูลจาก CSV ที่แปลงมา
        const rawData = [
            { id: 1, parentProject: "1. LOTTERY PLUS", bu: "Community (MKT)", task: "แนวทางการ BUILD COMMUNITY Online/Offline", detail: "การที่จะทำให้ COMMUNITY FIRST ทำยังไง มีกี่แบบ อะไรบ้าง และในแต่ละแบบทำยังไงแบบเป็นขั้นเป็นตอน ใครรับผิดชอบ", statusIcon: "🟡", statusText: "กำลังดำเนินการ", nextStep: "รอ Team Event และ CMO อัพเดทแผน Build Community" },
            { id: 2, parentProject: "1. LOTTERY PLUS", bu: "Brand Book", task: "จัดทำ Brand Book", detail: "รอทางทีม We Compound Brand ปรับปรุงจาก Comment", statusIcon: "🟡", statusText: "กำลังดำเนินการ", nextStep: "รอทางทีม We Compound Book คิว" },
            { id: 3, parentProject: "1. LOTTERY PLUS", bu: "MKT Structure", task: "อนุมัติแผนโครงสร้างทีมใหม่", detail: "CEO อนุมัติแล้ว ประสาน HR ทำ JD และสรรหาคนเพิ่ม", statusIcon: "🟡", statusText: "กำลังดำเนินการ", nextStep: "-" },
            { id: 4, parentProject: "1. LOTTERY PLUS", bu: "Event: Happy bus", task: "กิจกรรมรถบัสความสุข (Happy Bus)", detail: "สื่อสารถึงลูกค้าและ รอรวบรวมยอดทั้งหมด", statusIcon: "🟡", statusText: "กำลังดำเนินการ", nextStep: "ตอนนี้ได้ 400/500 และมีการขยายเวลาลงทะเบียนแล้ว" },
            { id: 5, parentProject: "1. LOTTERY PLUS", bu: "Event: Songkran", task: "แผนจัดงานสงกรานต์", detail: "สรุปงบประมาณและรายละเอียดกิจกรรมทั้งหมด และรอคุยกับทาง MONO", statusIcon: "🟡", statusText: "กำลังดำเนินการ", nextStep: "MONO จะปรับ Road map และ สรุป Requirement ตามที่ทีมและ CEO Approve" },
            { id: 6, parentProject: "1. LOTTERY PLUS", bu: "Event: Racing Project", task: "Agenda วันซ้อม/วันแข่ง", detail: "อยู่ในกระบวนการ ซ้อมตาม Calendar", statusIcon: "🟡", statusText: "กำลังดำเนินการ", nextStep: "-" },
            { id: 7, parentProject: "1. LOTTERY PLUS", bu: "NOKPLUSCLUB", task: "ทบทวนชื่อ NOKPLUS CLUB และ Feature", detail: "MVP 1 & 2 และ Timeline มาแล้ว", statusIcon: "🟡", statusText: "กำลังดำเนินการ", nextStep: "CEO ให้รวม MVP 1 & 2 ปล่อยพร้อมกันไม่เกิน ต.ค. (ทีมกำลังสรุป Feature)" },
            { id: 8, parentProject: "1. LOTTERY PLUS", bu: "Production", task: "นำเสนอ 3 รายการ Youtube", detail: "ตุ๊ดลองของ, โต๊ะหมูบูชา, Hope Land (ขึ้น DEMO ทุกรายการ)", statusIcon: "🟡", statusText: "กำลังดำเนินการ", nextStep: "Post ลง Social Media ของ Lottery Plus เรียบร้อยแล้ว" },
            { id: 9, parentProject: "1. LOTTERY PLUS", bu: "The Next Gen", task: "โปรแกรมพัฒนาบุคลากร", detail: "Camp: 24-26 ก.พ. 69", statusIcon: "🟢", statusText: "DONE", nextStep: "รอ BrandBook" },
            { id: 10, parentProject: "1. LOTTERY PLUS", bu: "HR Team", task: "สรุปแผนโครงสร้างทีม", detail: "รอนัดครั้งถัดไป", statusIcon: "🟡", statusText: "กำลังดำเนินการ", nextStep: "ต้องการการ Training พนักงานใหม่และเก่า" },
            { id: 11, parentProject: "2. MU TODAY", bu: "MU TODAY Community", task: "หาหมอดู Partner ระยะยาว", detail: "พัฒนา Feature ร่วมกับหมอดู Partner", statusIcon: "🟡", statusText: "กำลังดำเนินการ", nextStep: "นัดคุย Partnership Model" },
            { id: 12, parentProject: "2. MU TODAY", bu: "ปรับ DIRECTION", task: "เน้น PARTNER FIRST", detail: "หยุดโฟกัส Community ชั่วคราวเพื่อให้ Partner ดึง Community เข้ามาเอง", statusIcon: "🟡", statusText: "กำลังดำเนินการ", nextStep: "Focus Partnership! Support Production + Content" },
            { id: 13, parentProject: "2. MU TODAY", bu: "ทำนายฝัน", task: "อัปเดตฐานข้อมูล AI", detail: "พัฒนา AI ต่อและทำ Content on Social", statusIcon: "🟡", statusText: "กำลังดำเนินการ", nextStep: "หา Creative และ Tiktok" },
            { id: 14, parentProject: "3. CHECKIN PLUS", bu: "CIP Update", task: "Sale Support & ระบบชำระเงิน", detail: "อนุมัติ Sale Support 4 ตำแหน่ง และทำระบบชำระบัตรเครดิต", statusIcon: "🟡", statusText: "กำลังดำเนินการ", nextStep: "Checkin Book (BETA) ขึ้น Web ปลาย มี.ค." },
            { id: 15, parentProject: "4. THAIMART", bu: "Business Model", task: "Concept 'THAIMART = TRUST'", detail: "สรุป Business Model และทิศทางแบรนด์", statusIcon: "🟡", statusText: "กำลังดำเนินการ", nextStep: "Timeline: Web Beta (เม.ย.) / App (พ.ค.)" }
        ];

        let activeTab = "All Projects";
        let searchQuery = "";

        const projectsList = ["All Projects", "1. LOTTERY PLUS", "2. MU TODAY", "3. CHECKIN PLUS", "4. THAIMART"];

        function getProjectColor(name) {
            if (name.includes("1")) return "bg-red-500";
            if (name.includes("2")) return "bg-purple-500";
            if (name.includes("3")) return "bg-blue-500";
            if (name.includes("4")) return "bg-emerald-500";
            return "bg-slate-500";
        }

        function render() {
            // Filter Data
            const filtered = rawData.filter(item => {
                const matchTab = activeTab === "All Projects" || item.parentProject === activeTab;
                const s = searchQuery.toLowerCase();
                const matchSearch = item.bu.toLowerCase().includes(s) || item.task.toLowerCase().includes(s) || item.detail.toLowerCase().includes(s);
                return matchTab && matchSearch;
            });

            // Update Stats
            document.getElementById('totalTasks').innerText = filtered.length;
            document.getElementById('pendingTasks').innerText = filtered.filter(d => d.statusIcon === "🟡").length;
            document.getElementById('doneTasks').innerText = filtered.filter(d => d.statusIcon === "🟢").length;

            // Render Tabs
            const tabsContainer = document.getElementById('tabsContainer');
            tabsContainer.innerHTML = projectsList.map(p => `
                <button onclick="setActiveTab('${p}')" class="px-5 py-2.5 rounded-xl text-sm font-bold transition-all whitespace-nowrap ${activeTab === p ? 'bg-slate-900 text-white shadow-lg scale-105' : 'bg-white text-slate-500 border border-slate-200 hover:border-slate-400'}">
                    ${p === 'All Projects' ? 'ภาพรวมทั้งหมด' : p}
                </button>
            `).join('');

            // Render Table
            const tbody = document.getElementById('taskTableBody');
            if (filtered.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="px-6 py-20 text-center text-slate-400 font-bold">ไม่พบข้อมูลที่ค้นหา</td></tr>`;
            } else {
                tbody.innerHTML = filtered.map(row => `
                    <tr class="group hover:bg-indigo-50/30 transition-colors">
                        <td class="px-6 py-6 vertical-top min-w-[200px]">
                            <div class="flex flex-col gap-2">
                                <span class="inline-block w-fit px-2 py-0.5 rounded text-[9px] font-black text-white ${getProjectColor(row.parentProject)}">${row.parentProject}</span>
                                <span class="font-bold text-slate-900 text-sm">${row.bu}</span>
                            </div>
                        </td>
                        <td class="px-6 py-6 max-w-md">
                            <div class="font-bold text-slate-800 text-sm mb-1 group-hover:text-indigo-600 transition-colors">${row.task}</div>
                            <p class="text-xs text-slate-500 leading-relaxed">${row.detail}</p>
                        </td>
                        <td class="px-6 py-6">
                            <span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-bold ${row.statusIcon === '🟢' ? 'bg-emerald-100 text-emerald-700 border-emerald-200' : 'bg-amber-100 text-amber-700 border-amber-200'} border">
                                <i data-lucide="${row.statusIcon === '🟢' ? 'check-circle-2' : 'clock'}" class="w-3.5 h-3.5"></i>
                                ${row.statusText}
                            </span>
                        </td>
                        <td class="px-6 py-6 max-w-xs">
                            ${row.nextStep && row.nextStep !== '-' ? `
                                <div class="bg-slate-50 group-hover:bg-white p-3 rounded-xl border border-slate-100 flex gap-2">
                                    <i data-lucide="chevron-right" class="w-3.5 h-3.5 text-indigo-500 mt-0.5 flex-shrink-0"></i>
                                    <span class="text-xs font-semibold text-slate-600 leading-snug">${row.nextStep}</span>
                                </div>
                            ` : '<span class="text-slate-300 text-xs italic">ไม่มีข้อมูล</span>'}
                        </td>
                    </tr>
                `).join('');
            }
            // Re-initialize icons
            lucide.createIcons();
        }

        function setActiveTab(tab) { activeTab = tab; render(); }
        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchQuery = e.target.value;
            render();
        });

        // Initial Load
        window.onload = render;
    </script>
</body>
</html>
