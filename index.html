<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Monitoring Dashboard - TV Optimized</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/locale/th.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/plugin/customParseFormat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #0f172a; overflow: hidden; height: 100vh; color: white; }
        
        .main-dashboard-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 24px; 
            height: calc(100vh - 160px); 
            padding: 0 20px;
        }

        .project-column { 
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
            position: relative;
            background: rgba(15, 23, 42, 0.5);
            border-radius: 32px;
        }

        .column-header-sticky {
            position: relative;
            z-index: 50;
            padding: 10px 0;
            background: #0f172a;
        }

        .scroll-container {
            flex: 1;
            overflow: hidden;
            position: relative;
            mask-image: linear-gradient(to bottom, transparent, black 5%, black 95%, transparent);
        }

        .scroll-content {
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 10px;
            will-change: transform;
            animation: verticalScroll linear infinite;
        }

        /* ปรับ Animation ให้เลื่อนจาก 0 ถึง -33.33% เพราะเราคัดลอกเนื้อหาไว้ 3 ชุด */
        @keyframes verticalScroll {
            0% { transform: translateY(0); }
            100% { transform: translateY(-33.333%); }
        }

        .project-card { 
            border-radius: 24px; 
            overflow: hidden;
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            height: auto;
            flex-shrink: 0; /* ป้องกัน card ถูกบีบอัด */
        }

        .card-header-branded {
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .bg-lottery { background-color: #ef4444; }
        .text-lottery { color: #fca5a5; }
        .bg-mu { background-color: #a855f7; }
        .text-mu { color: #d8b4fe; }
        .bg-checkin { background-color: #eab308; }
        .text-checkin { color: #fef08a; }
        .bg-rizzup { background-color: #ec4899; }
        .text-rizzup { color: #fbcfe8; }
        .bg-thaimart { background-color: #3b82f6; }
        .text-thaimart { color: #93c5fd; }
        .bg-mixed { background-color: #64748b; }
        .text-mixed { color: #cbd5e1; }

        @keyframes pulse-soft { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .live-pulse { animation: pulse-soft 2s infinite; }
    </style>
</head>
<body class="p-6">

    <div id="app" class="h-full flex flex-col">
        <!-- Header -->
        <header class="flex items-center justify-between mb-8 bg-slate-800/50 p-6 rounded-3xl border border-white/5 shadow-2xl">
            <div class="flex items-center gap-5">
                <div class="bg-indigo-600 p-4 rounded-2xl shadow-lg shadow-indigo-500/20">
                    <i data-lucide="monitor" class="w-8 h-8 text-white"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-black uppercase tracking-tight text-white">Project Monitoring Dashboard</h1>
                    <div class="flex items-center gap-3 mt-1">
                        <span id="current-date-display" class="text-sm font-bold text-slate-400"></span>
                        <div class="flex items-center gap-2 px-3 py-0.5 bg-emerald-500/20 rounded-full border border-emerald-500/30">
                            <span class="w-2 h-2 bg-emerald-500 rounded-full live-pulse"></span>
                            <span class="text-[12px] font-black text-emerald-400 uppercase tracking-widest">System Live</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="flex items-center gap-10">
                <div class="text-right">
                    <p class="text-[12px] font-bold text-slate-500 uppercase tracking-widest mb-1">Active Tasks</p>
                    <p id="totalTasks" class="text-4xl font-black leading-none text-white">0</p>
                </div>
                <div class="h-12 w-[1px] bg-white/10"></div>
                <button onclick="toggleFullScreen()" class="p-4 bg-white/5 rounded-2xl hover:bg-white/10 border border-white/10 transition-all active:scale-95">
                    <i data-lucide="maximize" class="w-6 h-6 text-slate-400"></i>
                </button>
            </div>
        </header>

        <!-- Columns -->
        <div class="main-dashboard-grid">
            <div class="project-column">
                <div class="column-header-sticky">
                    <div class="flex items-center gap-3 bg-red-600 px-6 py-4 rounded-2xl shadow-lg shadow-red-900/20 mx-2">
                        <i data-lucide="ticket" class="w-6 h-6 text-white"></i>
                        <span class="text-lg font-black uppercase tracking-widest text-white">1. Lottery Plus</span>
                    </div>
                </div>
                <div class="scroll-container" id="container-lottery">
                    <div id="lotteryGrid" class="scroll-content"></div>
                </div>
            </div>

            <div class="project-column">
                <div class="column-header-sticky">
                    <div class="flex items-center gap-3 bg-purple-600 px-6 py-4 rounded-2xl shadow-lg shadow-purple-900/20 mx-2">
                        <i data-lucide="sparkles" class="w-6 h-6 text-white"></i>
                        <span class="text-lg font-black uppercase tracking-widest text-white">2. Mu Today</span>
                    </div>
                </div>
                <div class="scroll-container" id="container-mu">
                    <div id="muGrid" class="scroll-content"></div>
                </div>
            </div>

            <div class="project-column">
                <div class="column-header-sticky">
                    <div class="flex items-center gap-3 bg-slate-700 px-6 py-4 rounded-2xl shadow-lg shadow-slate-900/20 mx-2">
                        <i data-lucide="layers" class="w-6 h-6 text-white"></i>
                        <span class="text-lg font-black uppercase tracking-widest text-white">3. Others / RizzUp</span>
                    </div>
                </div>
                <div class="scroll-container" id="container-mixed">
                    <div id="mixedGrid" class="scroll-content"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        dayjs.extend(window.dayjs_plugin_customParseFormat);
        dayjs.locale('th');

        const rawData = [
            { project: "LOTTERY PLUS", bu: "Community (MKT)", task: "แนวทางการ BUILD COMMUNITY Online/Offline", detail: "การที่จะทำให้ COMMUNITY FIRST ทำยังไง มีกี่แบบ อะไรบ้าง และในแต่ละแบบทำยังไงแบบเป็นขั้นเป็นตอน ใครรับผิดชอบ ใครประสานงานทั้งหมด", status: "🟡", nextStep: "รอ Team Event และ CMO อัพเดทแผน Builld Community", owner: "CMO", receive: "2/27", due: "-" },
            { project: "LOTTERY PLUS", bu: "Brand Book", task: "จัดทำ Brand Book", detail: "รอทางทีม We Compound Brand ปรับปรุงจาก Comment", status: "❌", nextStep: "รอทางทีม We Compound", owner: "We Compound", receive: "2/6", due: "-" },
            { project: "LOTTERY PLUS", bu: "MKT Structure", task: "CEO อนุมัติแผนโครงสร้างทีมใหม่แล้ว", detail: "ประสาน HR ทำ JD และสรรหาคนเพิ่ม", status: "🟡", nextStep: "Creator in resident CMO(พี่อิท) จะไปจัดการเงื่อนไข กรอบเวลา และแนวทางมาเสนอภายหลัง", owner: "CMO", receive: "3/5", due: "-" },
            { project: "LOTTERY PLUS", bu: "Event: Happy bus", task: "กิจกรรมรถบัสความสุข (Happy Bus)", detail: "สื่อสารถึงลูกค้าและ รอรวมรวบยอดทั้งหมด", status: "🟡", nextStep: "กำลังดำเนินการ ตอนนี้ได้ 400/500 และมีการขยายเวลาลงทะเบียนแล้ว", owner: "Event", receive: "2/20", due: "4/10" },
            { project: "LOTTERY PLUS", bu: "Event: Songkran", task: "แผนจัดงานสงกรานต์", detail: "สรุปงบประมาณและรายละเอียดกิจกรรมทั้งหมด และรอคุยกับทาง MONO", status: "🟡", nextStep: "MONO จะปรับ Road map และ สรุป Reqirement ตามที่ทีม และ CEO Prove", owner: "MONO", receive: "3/5", due: "3/23" },
            { project: "LOTTERY PLUS", bu: "Event: Racing Project", task: "Agenda วันซ้อม/วันแข่ง", detail: "อยู่ในกระบวนการ ซ้อมตาม Calendar", status: "🟡", nextStep: "Post ลง Social Media ของ Lottery plus แล้ว", owner: "Marketing Team", receive: "2/1", due: "-" },
            { project: "LOTTERY PLUS", bu: "The Next Gen (คุณ SOFT)", task: "โปรแกรมพัฒนาบุคลากร", detail: "Camp: อบรมเสร็จแล้ว และ อนุมัติงบประมาณทำ BrandBook แล้ว", status: "🟡", nextStep: "และรอ ประชุมBrand bookกับคุณซอฟ", owner: "คุณSOFT", receive: "3/5", due: "3/25" },
            { project: "LOTTERY PLUS", bu: "HR team", task: "สรุป แผนโครงสร้าง TEAM", detail: "รอนัดครั้งถัดไป", status: "🟡", nextStep: "รอคุณ รถตู้ นัด MEETING", owner: "คุณ รถตู้", receive: "3/9", due: "-" },
            { project: "MU TODAY", bu: "MU TODAY Community", task: "Partnership Focus", detail: "หยุดโฟกัส COMMUNITY และเน้นไปที่ PARTNER FIRST ก่อน แล้ว COMMUNITY จะมาเอง", status: "🟡", nextStep: "Focus Parthnership! Support Partnership (Production + Content)", owner: "Team Mutoday", receive: "3/6", due: "-" },
            { project: "MU TODAY", bu: "ทำนายฝัน", task: "อัปเดตฐานข้อมูลและการทำนาย", detail: "พัฒนา AI ต่อและ ทำ Content on Social", status: "🟡", nextStep: "หา Creative และ TIktok", owner: "Team Mutoday", receive: "2/11", due: "-" },
            { project: "CHECKIN PLUS", bu: "CHECKIN PLUS", task: "Sale Support & Payment", detail: "อนุมัติ Sale Support 4 ตำแหน่ง (เด็กจบใหม่) และทำเรื่องการชำระเงินผ่านบัตรเครดิต", status: "🟡", nextStep: "Checkin Book (BETA) ขึ้น Beta Web ปลาย มี.ค.", owner: "คุณอิง และ คุณเกน", receive: "2/6", due: "-" },
            { project: "THAIMART", bu: "THAIMART", task: "Business Model & TRUST", detail: "สรุป Business Model คอนเซปต์ THAIMART = TRUST", status: "🟡", nextStep: "พี่นัทลองวางโครงสร้าง Branding และ Structure ของ THAIMART แล้วนำมาเสนอภายหลัง", owner: "คุณ นัท MU", receive: "3/1", due: "-" },
            { project: "RIZZ UP", bu: "RIZZ UP", task: "Content & Community Planning", detail: "เตรียมแผนการทำ Content และการสร้าง Community บนแพลตฟอร์มใหม่", status: "🟡", nextStep: "สรุปทิศทาง Branding และเตรียมงาน Production", owner: "RIZZUPTEAM", receive: "3/10", due: "-" }
        ];

        function getTheme(projectName) {
            const name = projectName.toUpperCase();
            if (name.includes("LOTTERY")) return { bg: "bg-lottery", text: "text-lottery" };
            if (name.includes("MU")) return { bg: "bg-mu", text: "text-mu" };
            if (name.includes("CHECKIN")) return { bg: "bg-checkin", text: "text-checkin" };
            if (name.includes("RIZZ")) return { bg: "bg-rizzup", text: "text-rizzup" };
            if (name.includes("THAI")) return { bg: "bg-thaimart", text: "text-thaimart" };
            return { bg: "bg-mixed", text: "text-mixed" };
        }

        function createCard(item) {
            const theme = getTheme(item.project);
            const statusLabel = item.status === "🟡" ? "IN PROCESS" : (item.status === "❌" ? "PENDING/ISSUE" : "COMPLETED");
            const statusColor = item.status === "🟡" ? "bg-amber-500/20 text-amber-400 border-amber-500/30" : "bg-red-500/20 text-red-400 border-red-500/30";
            
            return `
                <div class="project-card shadow-xl shadow-black/20">
                    <div class="card-header-branded ${theme.bg}">
                        <span class="text-[11px] font-black uppercase tracking-[0.2em] text-white/90">${item.project}</span>
                        <span class="text-[10px] font-bold px-3 py-1 rounded-full bg-black/30 text-white border border-white/10">${statusLabel}</span>
                    </div>
                    <div class="p-6">
                        <div class="flex justify-between items-start mb-3">
                            <p class="text-[12px] font-bold ${theme.text} uppercase tracking-wider">${item.bu}</p>
                            <span class="text-[10px] font-bold px-2.5 py-1 rounded-lg border ${statusColor}">${statusLabel}</span>
                        </div>
                        <h3 class="text-xl font-bold text-white mb-3 leading-tight">${item.task}</h3>
                        <p class="text-[12px] text-slate-400 mb-5 leading-relaxed">${item.detail || '-'}</p>
                        <div class="bg-white/5 p-4 rounded-2xl border border-white/5 mb-5 shadow-inner flex flex-col gap-2">
                            <span class="text-[11px] font-black ${theme.text} uppercase tracking-widest flex items-center gap-2">
                                <i data-lucide="arrow-right-circle" class="w-3.5 h-3.5"></i>
                                Next Step
                            </span>
                            <p class="text-[14px] font-medium text-slate-100 leading-relaxed">${item.nextStep || '-'}</p>
                        </div>
                        <div class="flex flex-col gap-4 pt-5 border-t border-white/5">
                            <div class="flex items-center gap-4">
                                <div class="w-12 h-12 rounded-2xl bg-slate-700/50 flex items-center justify-center border border-white/10">
                                    <i data-lucide="user-2" class="w-6 h-6 text-white/80"></i>
                                </div>
                                <div>
                                    <p class="text-[10px] font-bold text-slate-500 uppercase leading-none mb-1.5 tracking-tighter text-slate-400">Person in charge</p>
                                    <p class="text-[15px] font-black text-slate-100">${item.owner || '-'}</p>
                                </div>
                            </div>
                            <div class="grid grid-cols-2 gap-3">
                                <div class="bg-black/20 p-3 rounded-2xl border border-white/5">
                                    <p class="text-[9px] font-bold text-slate-500 uppercase mb-1">Received</p>
                                    <p class="text-[14px] font-black ${theme.text}">${item.receive || '-'}</p>
                                </div>
                                <div class="bg-black/20 p-3 rounded-2xl border border-white/5 text-right">
                                    <p class="text-[9px] font-bold text-slate-500 uppercase mb-1">Deadline</p>
                                    <p class="text-[14px] font-black ${theme.text}">${item.due || '-'}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        /**
         * แก้ไขปัญหา Card แหว่งด้วย Triple Buffering
         */
        function setupAutoScroll(gridId, containerId) {
            const grid = document.getElementById(gridId);
            const container = document.getElementById(containerId);
            
            // รอให้ Layout วาดเสร็จจริงเพื่อให้ scrollHeight ถูกต้อง
            const realHeight = grid.getBoundingClientRect().height;
            if (realHeight <= container.clientHeight) {
                grid.style.animation = 'none';
                return;
            }

            // คัดลอกเนื้อหา 3 ชุดเพื่อให้แน่ใจว่าไม่มีช่องว่างตอนลูป
            const originalContent = grid.innerHTML;
            grid.innerHTML = originalContent + originalContent + originalContent;

            // คำนวณความเร็ว
            const duration = realHeight / 30; // ความเร็ว 30px ต่อวินาที
            grid.style.animationDuration = `${duration}s`;
        }

        function toggleFullScreen() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        }

        function render() {
            document.getElementById('current-date-display').innerText = dayjs().format('DD MMMM YYYY');
            document.getElementById('totalTasks').innerText = rawData.length;

            const lottery = rawData.filter(i => i.project.toUpperCase().includes("LOTTERY"));
            const mu = rawData.filter(i => i.project.toUpperCase().includes("MU"));
            const mixed = rawData.filter(i => !i.project.toUpperCase().includes("LOTTERY") && !i.project.toUpperCase().includes("MU"));

            document.getElementById('lotteryGrid').innerHTML = lottery.map(createCard).join('');
            document.getElementById('muGrid').innerHTML = mu.map(createCard).join('');
            document.getElementById('mixedGrid').innerHTML = mixed.map(createCard).join('');

            lucide.createIcons();

            // ใช้ requestAnimationFrame หรือ setTimeout เพื่อรอให้ DOM พร้อมคำนวณขนาด
            window.requestAnimationFrame(() => {
                setTimeout(() => {
                    setupAutoScroll('lotteryGrid', 'container-lottery');
                    setupAutoScroll('muGrid', 'container-mu');
                    setupAutoScroll('mixedGrid', 'container-mixed');
                }, 500);
            });
        }

        window.onload = render;
    </script>
</body>
</html>
