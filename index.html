<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Project Monitoring Dashboard - Live Update</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/locale/th.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/plugin/customParseFormat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Kanit', sans-serif;
            background-color: #020617;
            color: white;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            /* ป้องกัน text-select ระหว่าง scroll บน iOS */
            -webkit-user-select: none;
            user-select: none;
        }

        /* Desktop specific */
        @media (min-width: 1025px) {
            body { overflow: hidden; height: 100vh; }
            .main-dashboard-grid { 
                display: grid; 
                grid-template-columns: repeat(3, 1fr); 
                gap: 24px; 
                height: calc(100vh - 140px); 
                padding: 0 20px;
            }
            .scroll-content {
                animation: scroll-vertical linear infinite;
            }
            .project-column {
                display: flex !important;
                background: rgba(15, 23, 42, 0.3);
                border-radius: 24px;
                flex-direction: column;
                overflow: hidden;
            }
        }

        /* Mobile specific */
        @media (max-width: 1024px) {
            /* ใช้ dvh แทน vh เพื่อให้ address bar ของ iOS ไม่ trigger resize */
            body {
                overflow-y: auto;
                padding-bottom: 100px;
                /* ป้องกัน bounce scroll ที่ทำให้ layout สะดุด */
                overscroll-behavior-y: contain;
            }
            .main-dashboard-grid { display: block; padding: 12px; }
            .project-column { display: none; width: 100%; border-radius: 24px; overflow: hidden; margin-bottom: 20px; }
            .project-column.active { display: flex; flex-direction: column; }
            .scroll-content {
                animation: none !important;
                padding: 16px 0;
                /* GPU acceleration สำหรับ scroll ที่ลื่นขึ้น */
                transform: translateZ(0);
                will-change: transform;
            }
            .scroll-container {
                overflow: visible !important;
                mask-image: none !important;
                -webkit-overflow-scrolling: touch; /* iOS momentum scroll */
            }
            .tab-bar { display: flex !important; }
            /* ป้องกัน tap delay บน iOS */
            .tab-item, .project-card { touch-action: manipulation; }
        }

        .scroll-container {
            flex: 1;
            overflow: hidden;
            position: relative;
            mask-image: linear-gradient(to bottom, transparent, black 8%, black 92%, transparent);
        }

        .scroll-content {
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 20px 10px;
        }

        @keyframes scroll-vertical {
            0% { transform: translateY(0); }
            100% { transform: translateY(-50%); }
        }

        .scroll-container:hover .scroll-content {
            animation-play-state: paused;
        }

        .project-card { 
            border-radius: 24px; 
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease;
        }

        .progress-track {
            height: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            border-radius: 10px;
            position: relative;
            transition: width 1s ease-in-out;
        }

        .shimmer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            animation: shimmer-effect 2s infinite linear;
            background-size: 200% 100%;
        }

        @keyframes shimmer-effect {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* --- THEMES --- */
        .theme-red { border-left: 6px solid #ef4444; }
        .theme-red .bar { background: linear-gradient(90deg, #b91c1c, #ef4444); }
        .theme-red .text-accent { color: #f87171; }
        .theme-red .bg-accent { background: rgba(239, 68, 68, 0.05); border: 1px solid rgba(239, 68, 68, 0.15); }
        .theme-red .text-theme { color: #ef4444; } 

        .theme-purple { border-left: 6px solid #9333ea; }
        .theme-purple .bar { background: linear-gradient(90deg, #6b21a8, #9333ea); }
        .theme-purple .text-accent { color: #c084fc; }
        .theme-purple .bg-accent { background: rgba(147, 51, 234, 0.05); border: 1px solid rgba(147, 51, 234, 0.15); }
        .theme-purple .text-theme { color: #a855f7; }

        .theme-yellow { border-left: 6px solid #eab308; }
        .theme-yellow .bar { background: linear-gradient(90deg, #a16207, #eab308); }
        .theme-yellow .text-accent { color: #fde047; }
        .theme-yellow .bg-accent { background: rgba(234, 179, 8, 0.05); border: 1px solid rgba(234, 179, 8, 0.15); }
        .theme-yellow .text-theme { color: #facc15; }

        .theme-blue { border-left: 6px solid #3b82f6; }
        .theme-blue .bar { background: linear-gradient(90deg, #1d4ed8, #3b82f6); }
        .theme-blue .text-accent { color: #60a5fa; }
        .theme-blue .bg-accent { background: rgba(59, 130, 246, 0.05); border: 1px solid rgba(59, 130, 246, 0.15); }
        .theme-blue .text-theme { color: #60a5fa; }

        .theme-pink { border-left: 6px solid #ec4899; }
        .theme-pink .bar { background: linear-gradient(90deg, #be185d, #ec4899); }
        .theme-pink .text-accent { color: #f472b6; }
        .theme-pink .bg-accent { background: rgba(236, 72, 153, 0.05); border: 1px solid rgba(236, 72, 153, 0.15); }
        .theme-pink .text-theme { color: #f472b6; }

        .theme-green { border-left: 6px solid #22c55e; }
        .theme-green .bar { background: linear-gradient(90deg, #15803d, #22c55e); }
        .theme-green .text-accent { color: #4ade80; }
        .theme-green .bg-accent { background: rgba(34, 197, 94, 0.05); border: 1px solid rgba(34, 197, 94, 0.15); }
        .theme-green .text-theme { color: #22c55e; }

        .theme-slate { border-left: 6px solid #64748b; }
        .theme-slate .bar { background: linear-gradient(90deg, #334155, #64748b); }
        .theme-slate .text-accent { color: #94a3b8; }
        .theme-slate .bg-accent { background: rgba(100, 116, 139, 0.05); border: 1px solid rgba(100, 116, 139, 0.15); }
        .theme-slate .text-theme { color: #cbd5e1; }

        .status-inprogress { background: #d97706 !important; color: white !important; }
        .status-rejected { background: #dc2626 !important; color: white !important; }

        .tab-bar {
            display: none;
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            background: #0f172a;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 0;
            z-index: 1000;
            justify-content: space-around;
        }

        .tab-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #64748b; flex: 1; }
        .tab-item.active { color: white; }
        .tab-item.active.red { color: #f87171; }
        .tab-item.active.purple { color: #c084fc; }
        .tab-item.active.slate { color: #cbd5e1; }
        .tab-item span { font-size: 10px; font-weight: 800; }
    </style>
</head>
<body class="p-2 md:p-4">

    <div id="app" class="h-full flex flex-col min-h-screen">
        <header class="flex items-center justify-between mb-4 md:mb-6 px-4 py-3 bg-slate-900/50 rounded-3xl border border-white/5">
            <div class="flex items-center gap-3 md:gap-4">
                <div class="bg-indigo-600 p-2 md:p-3 rounded-2xl shadow-lg">
                    <i data-lucide="layout-grid" class="w-5 h-5 md:w-6 md:h-6 text-white"></i>
                </div>
                <div>
                    <h1 class="text-lg md:text-2xl font-black italic tracking-tighter uppercase text-white leading-none">Project Monitoring</h1>
                    <p id="current-date-display" class="text-[10px] md:text-xs font-bold text-slate-500 uppercase mt-1"></p>
                </div>
            </div>
            <div class="flex gap-4 items-center">
                <div class="hidden md:block text-right">
                    <span class="text-[10px] font-bold text-slate-500 block uppercase">System Status</span>
                    <span id="last-update-text" class="text-[11px] font-black text-emerald-400 uppercase tracking-tight">กำลังโหลดข้อมูลจาก Google Sheets... <span class="text-[11px] font-black text-red-500 uppercase tracking-tight"> >> หากต้องการหยุดอ่าน Card กรุณานำ Cursor Remote ชี้ที่ Card ครับ</span></span>
                </div>
                <button onclick="toggleFullScreen()" class="hidden md:flex items-center gap-2 px-4 py-2 bg-white/5 rounded-2xl border border-white/10 text-slate-300 hover:bg-white/10 transition-all">
                    <i data-lucide="maximize" class="w-4 h-4"></i>
                    <span class="text-[9px] font-black tracking-widest uppercase">Fullscreen</span>
                </button>
            </div>
        </header>

        <div class="main-dashboard-grid" id="main-grid">
            <!-- 1. Lottery Plus -->
            <section class="project-column active" id="path-1">
                <div class="px-6 py-4 bg-red-600/90 md:rounded-t-2xl flex justify-between items-center shadow-lg rounded-2xl md:rounded-none">
                    <div class="flex items-center gap-3">
                        <i data-lucide="ticket" class="w-5 h-5 text-white"></i>
                        <span class="font-black text-white tracking-widest uppercase text-base md:text-lg">Lottery Plus & HR</span>
                    </div>
                    <span id="count-1" class="text-[10px] bg-black/30 px-2 py-0.5 rounded-full font-bold">0</span>
                </div>
                <div class="scroll-container">
                    <div id="grid-1" class="scroll-content"></div>
                </div>
            </section>

            <!-- 2. Mu Today -->
            <section class="project-column" id="path-2">
                <div class="px-6 py-4 bg-purple-600/90 md:rounded-t-2xl flex justify-between items-center shadow-lg rounded-2xl md:rounded-none">
                    <div class="flex items-center gap-3">
                        <i data-lucide="moon" class="w-5 h-5 text-white"></i>
                        <span class="font-black text-white tracking-widest uppercase text-base md:text-lg">Mu Today</span>
                    </div>
                    <span id="count-2" class="text-[10px] bg-black/30 px-2 py-0.5 rounded-full font-bold">0</span>
                </div>
                <div class="scroll-container">
                    <div id="grid-2" class="scroll-content"></div>
                </div>
            </section>

            <!-- 3. Others -->
            <section class="project-column" id="path-3">
                <div class="px-6 py-4 bg-slate-700/90 md:rounded-t-2xl flex justify-between items-center shadow-lg rounded-2xl md:rounded-none">
                    <div class="flex items-center gap-3">
                        <i data-lucide="layers" class="w-5 h-5 text-white"></i>
                        <span class="font-black text-white tracking-widest uppercase text-base md:text-lg">Others</span>
                    </div>
                    <span id="count-3" class="text-[10px] bg-black/30 px-2 py-0.5 rounded-full font-bold">0</span>
                </div>
                <div class="scroll-container">
                    <div id="grid-3" class="scroll-content"></div>
                </div>
            </section>
        </div>

        <!-- Mobile Tab Bar -->
        <nav class="tab-bar">
            <button class="tab-item active red" onclick="navigate(1)">
                <i data-lucide="ticket" class="w-6 h-6"></i>
                <span>LOTTERY</span>
            </button>
            <button class="tab-item" id="nav-2" onclick="navigate(2)">
                <i data-lucide="moon" class="w-6 h-6"></i>
                <span>MU TODAY</span>
            </button>
            <button class="tab-item" id="nav-3" onclick="navigate(3)">
                <i data-lucide="layers" class="w-6 h-6"></i>
                <span>OTHERS</span>
            </button>
        </nav>
    </div>

    <script>
        dayjs.extend(window.dayjs_plugin_customParseFormat);
        dayjs.locale('th');
        // ใช้ฟังก์ชัน แทน const เพื่อให้ตรวจสอบขนาดหน้าจอจริงๆ เมื่อเรียกใช้
        const getIsMobile = () => window.innerWidth <= 1024;
        let isMobile = getIsMobile();
        const NOW = dayjs();

        // ─── Google Sheets Config ───────────────────────────────────────────────
        const SHEET_ID = "1TLC3VgzmJgOpjfKG5vSxzwP46uGo0Lyc0oVdeY8Koz4";
        const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

        // แปลง gviz Date format "Date(2026,1,27)" → "2/27" (months are 0-indexed)
        function parseGvizDate(val) {
            if (!val || String(val) === '-') return '-';
            const m = String(val).match(/Date\((\d+),(\d+),(\d+)\)/);
            if (!m) return String(val).trim();
            return `${parseInt(m[2]) + 1}/${m[3]}`;
        }

        async function fetchSheetData() {
            const res = await fetch(SHEET_URL);
            const text = await res.text();
            // Strip JSONP wrapper: /*O_o*/\ngoogle.visualization.Query.setResponse({...});
            const json = JSON.parse(text.replace(/^[^{]+/, '').replace(/\);\s*$/, ''));
            const rows = json.table.rows;

            let lastProject = "";
            return rows
                .filter(row => row.c && row.c[1]?.v) // ต้องมี BU อย่างน้อย
                .map(row => {
                    const get = (i) => (row.c[i]?.v != null) ? String(row.c[i].v).trim() : "";
                    if (get(0)) lastProject = get(0).replace(/^\s+/, '');
                    return {
                        project: lastProject,
                        bu:      get(1),
                        task:    get(2),
                        detail:  get(3),
                        status:  get(4).includes("❌") ? "REJECTED" : "IN PROGRESS",
                        nextStep: get(5),
                        owner:   get(6),
                        receive: parseGvizDate(row.c[7]?.v),
                        due:     get(8) || "-"
                    };
                });
        }

        function setLoading() {
            [1, 2, 3].forEach(id => {
                document.getElementById(`grid-${id}`).innerHTML =
                    '<div class="p-8 text-center text-slate-500 text-sm animate-pulse">กำลังโหลดข้อมูล...</div>';
                document.getElementById(`count-${id}`).innerText = '...';
            });
        }

        // ─── แยก 2 ขั้น: โหลดข้อมูลก่อน → render UI → ไม่หน่วง ────────────────
        async function loadAndRender() {
            try {
                // ขั้น 1: fetch ข้อมูลจาก Sheet
                const data = await fetchSheetData();

                // ขั้น 2: render card ทันที (ไม่รอ AI)
                const p = (name) => name.toUpperCase();
                const col1 = data.filter(i => p(i.project).includes("LOTTERY") || p(i.project).includes("HR"));
                const col2 = data.filter(i => p(i.project).includes("MU"));
                const col3 = data.filter(i =>
                    !p(i.project).includes("LOTTERY") &&
                    !p(i.project).includes("MU") &&
                    !p(i.project).includes("HR")
                );

                // render พร้อมกันทั้ง 3 column
                initScroll(1, col1);
                initScroll(2, col2);
                initScroll(3, col3);
                lucide.createIcons();

                // ขั้น 3: อัพเดท status bar แยกต่างหาก ไม่ block UI
                const now = dayjs();
                document.getElementById('last-update-text').innerHTML =
                    `Live จาก Google Sheets · อัพเดทล่าสุด ${now.format('DD/MM/YY HH:mm')} น. <span class="text-red-500"> >> หากต้องการหยุดอ่าน Card กรุณานำ Cursor Remote ชี้ที่ Card ครับ</span>`;

            } catch(e) {
                console.error("Fetch sheet error:", e);
                document.getElementById('last-update-text').innerHTML =
                    '<span class="text-red-400">โหลดข้อมูลไม่สำเร็จ — ตรวจสอบว่า Sheet เป็น Public</span>';
            }
        }

        function navigate(id) {
            if (!isMobile) return;
            document.querySelectorAll('.tab-item').forEach((btn, idx) => {
                const isActive = (idx + 1) === id;
                btn.classList.toggle('active', isActive);
                if(isActive) {
                    btn.classList.add(id === 1 ? 'red' : (id === 2 ? 'purple' : 'slate'));
                } else {
                    btn.classList.remove('red', 'purple', 'slate');
                }
            });
            document.querySelectorAll('.project-column').forEach(p => p.classList.remove('active'));
            document.getElementById(`path-${id}`).classList.add('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function toggleFullScreen() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else if (document.exitFullscreen) document.exitFullscreen();
        }

        function getProgress(receiveStr, dueStr) {
            // ถ้าไม่มีกำหนดวันจบ ให้ถือว่าเพิ่งเริ่ม 15%
            if (!dueStr || dueStr === "-" || dueStr === "") return { percent: 15, text: "WAITING" };
            
            // ใช้ปีปัจจุบันจากระบบ
            const currentYear = NOW.year();
            const start = dayjs(`${currentYear}/${receiveStr}`, 'YYYY/M/D');
            const end = dayjs(`${currentYear}/${dueStr}`, 'YYYY/M/D');
            
            const total = end.diff(start, 'day');
            const elapsed = NOW.diff(start, 'day');
            
            // คำนวณเปอร์เซ็นต์ตามเวลาจริง (min 10%, max 98%)
            let percent = Math.min(Math.max(Math.round((elapsed / total) * 100), 10), 98);
            if (isNaN(percent)) percent = 15;
            
            return { percent, text: `${percent}%` };
        }

        function getThemeClass(projectName) {
            const n = projectName.toUpperCase();
            if (n.includes("LOTTERY")) return "theme-red";
            if (n.includes("MU")) return "theme-purple";
            if (n.includes("CHECKIN")) return "theme-yellow";
            if (n.includes("THAIMART")) return "theme-blue";
            if (n.includes("RIZZ")) return "theme-pink";
            if (n.includes("CASHFLOW")) return "theme-green";
            return "theme-slate";
        }

        function createCard(item) {
            const prog = getProgress(item.receive, item.due);
            const theme = getThemeClass(item.project);
            const statusClass = item.status === "REJECTED" ? "status-rejected" : "status-inprogress";
            
            return `
                <div class="project-card p-5 shadow-2xl ${theme} mb-2">
                    <div class="flex justify-between items-start mb-3">
                        <div class="flex-1">
                            <h2 class="text-[12px] font-black text-theme uppercase tracking-widest mb-1">${item.project}</h2>
                            <p class="text-[9px] font-bold text-slate-500 uppercase mb-2">${item.bu}</p>
                            <h3 class="text-base font-bold text-white leading-tight">${item.task}</h3>
                        </div>
                        <span class="text-[8px] font-black px-2 py-1 rounded-full ${statusClass} tracking-widest uppercase">
                            ${item.status}
                        </span>
                    </div>

                    <div class="mb-4 text-[11px] text-slate-400 font-medium border-l-2 border-white/10 pl-3 leading-relaxed">
                        ${item.detail}
                    </div>

                    <div class="mb-4">
                        <div class="flex justify-between items-end mb-1.5">
                            <span class="text-[9px] font-bold text-slate-500 uppercase tracking-widest">Progress (Live)</span>
                            <span class="text-[11px] font-black text-accent">${prog.text}</span>
                        </div>
                        <div class="progress-track">
                            <div class="progress-fill bar" style="width: ${prog.percent}%">
                                <div class="shimmer"></div>
                            </div>
                        </div>
                    </div>

                    <div class="bg-accent rounded-2xl p-3 border border-white/5 mb-4">
                        <div class="flex items-center gap-2 mb-1">
                            <i data-lucide="arrow-right-circle" class="w-3 h-3 text-accent"></i>
                            <span class="text-[9px] font-black uppercase text-white">Next Step</span>
                        </div>
                        <p class="text-[11px] font-semibold text-slate-200 leading-snug">${item.nextStep}</p>
                    </div>

                    <div class="flex justify-between items-center pt-3 border-t border-white/5">
                        <div class="flex items-center gap-2">
                            <div class="w-7 h-7 rounded-full bg-slate-800 flex items-center justify-center border border-white/10">
                                <i data-lucide="user" class="w-3.5 h-3.5 text-theme"></i>
                            </div>
                            <span class="text-[9px] font-bold text-slate-400 uppercase">${item.owner}</span>
                        </div>
                        <div class="flex gap-3">
                            <div class="text-right">
                                <p class="text-[7px] font-bold text-slate-600 uppercase">วันสั่งงาน</p>
                                <p class="text-[9px] font-black text-theme">${item.receive}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-[7px] font-bold text-slate-600 uppercase">DEADLINE</p>
                                <p class="text-[9px] font-black text-theme">${item.due}</p>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function initScroll(id, items) {
            const grid = document.getElementById(`grid-${id}`);
            const count = document.getElementById(`count-${id}`);
            count.innerText = items.length;
            const html = items.map(createCard).join('');
            if (!isMobile) {
                grid.innerHTML = html + html;
                grid.style.animationDuration = `${Math.max(items.length * 12, 30)}s`;
            } else {
                grid.innerHTML = html;
            }
        }

        window.onload = async () => {
            document.getElementById('current-date-display').innerText = NOW.format('DD MMMM YYYY');
            if (isMobile) navigate(1);
            setLoading();
            await loadAndRender();
            // Auto-refresh ทุก 30 นาที (ข้อมูลอัปเดตหลังประชุม ไม่จำเป็นต้อง refresh บ่อย)
            setInterval(loadAndRender, 30 * 60 * 1000);
        };

        // ─── Resize Handler (ไม่ reload แล้ว — ปรับ Layout แทน) ─────────────────
        // บน iOS address bar ขึ้น/ลงทำให้ resize trigger ตลอด ถ้า reload จะกระตุก
        let _lastWidth = window.innerWidth;
        let _resizeTimer;
        window.addEventListener('resize', () => {
            clearTimeout(_resizeTimer);
            _resizeTimer = setTimeout(() => {
                const newWidth = window.innerWidth;
                // เช็คว่า width เปลี่ยนจริง (ไม่ใช่แค่ address bar ขึ้น/ลง)
                if (Math.abs(newWidth - _lastWidth) > 100) {
                    _lastWidth = newWidth;
                    isMobile = getIsMobile();
                    // ปรับ layout ใหม่โดยไม่ reload
                    if (isMobile) navigate(1);
                }
                // ถ้า height เปลี่ยนอย่างเดียว (iOS address bar) → ไม่ทำอะไร
            }, 300);
        });
    </script>
</body>
</html>
